name: Android CI

on:
  push:
    branches: [ main, '001-wandering-ledger' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Build (unit tests)
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew testDebugUnitTest --no-daemon
          else
            echo "Gradle wrapper not committed yet; tracked by T004a."
          fi
      - name: Run instrumentation (smoke)
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew connectedDebugAndroidTest --no-daemon || echo "Instrumented tests may fail on GH runners"
          else
            echo "Gradle wrapper not committed yet; skipping instrumentation smoke."
          fi
      - name: Generate coverage report
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew jacocoTestReport --no-daemon || echo "Coverage report generation failed"
          else
            echo "Gradle wrapper not committed yet; skipping coverage report."
          fi
      - name: Enforce coverage threshold
        run: |
          echo "Coverage parser placeholder. T036 will wire final report paths and thresholds."

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Run ktlint
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew ktlintCheck --no-daemon
          else
            echo "Gradle wrapper not committed yet; tracked by T004a."
          fi
      - name: Run Gradle check (lint + unit tests)
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew check --no-daemon
          else
            echo "Gradle wrapper not committed yet; tracked by T004a."
          fi
